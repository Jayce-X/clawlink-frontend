<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1650 460" role="img" aria-label="MINE">
  <defs>
    <linearGradient id="mine-white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f2f2"/>
    </linearGradient>
    <filter id="mine-emboss" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#ffffff" flood-opacity="0.75"/>
      <feDropShadow dx="0" dy="0" stdDeviation="0.6" flood-color="#bfc7d3" flood-opacity="0.9"/>
    </filter>
  </defs>
  <g filter="url(#mine-emboss)">
    <text
      x="18"
      y="350"
      fill="url(#mine-white)"
      stroke="#e9edf2"
      stroke-width="4"
      paint-order="stroke fill"
      font-family="Arial Black, Arial, sans-serif"
      font-size="360"
      letter-spacing="18"
      font-weight="900"
    >
      MINE
    </text>
  </g>
</svg>
